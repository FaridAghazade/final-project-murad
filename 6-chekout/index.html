<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../header.css">
    <link rel="stylesheet" href="../footer.css">
    <link rel="stylesheet" href="./chekout.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="he-div">
            <p class="header-p">Summer Sale For ALL Swim Suits And Free Express Delivery-OFF 50%! </p>
            <a href="" class="he-a">ShopNow</a>
        </div>
        <div class="he-div2">
            <h2 class="nav-h2">E-commerce</h2>
            <a href="" class="he-a" style="border-bottom: 2px solid black;">Home</a>
            <a href="" class="he-a">Contact</a>
            <a href="" class="he-a">About</a>
            <a href="" class="he-a">Sign Up</a>

            <button class="btn-1">
                Shop
            </button>
            <div class="he-div3">
                <div class="small">
                    <input type="text" placeholder="What are you looking for?" class="input-he">
                    <i class="fa-solid fa-magnifying-glass" class="he-i"></i>
                    <i class="fa-solid fa-cart-shopping" class="he-i"></i>
                    <i class="fa-regular fa-user" class="he-1"></i>
                    <p id="sign-p">username</p>
                    <button class="btn-1">Log out</button>
                </div>
                <div class="small-2">
                    <input type="text" placeholder="What are you looking for?" class="input-he">
                    <i class="fa-solid fa-magnifying-glass" class="he-i"></i>
                    <button class="btn-2">Log in</button>
                </div>
            </div>
        </div>

    </header>
    <main>
        <div class="sec-2">
            <form>
                <label for="first-name">First name</label><br>
                <input type="text" name="first-name" id="i1" class="all-inputs" required><br><br>

                <label for="last-name">Last name</label><br>
                <input type="text" name="last-name" id="i2" class="all-inputs" required><br><br>

                <label for="state">State</label><br>
                <select name="state" id="i2" class="all-inputs" required>
                    <option value="amerika">Amerika</option>
                    <option value="germany">Germany</option>
                    <option value="azerbaijcan">Azerbaijan</option>
                    <option value="france">France</option>
                    <option value="spain">Spain</option>
                    <option value="italy">Italy</option>
                </select><br><br>

                <label for="city">City</label><br>
                <input type="text" name="city" id="i4" class="all-inputs" required><br><br>

                <label for="zip">Address</label><br>
                <input type="text" name="zip" id="i5" class="all-inputs" required><br><br>

                <label for="telephone">Zip</label><br>
                <input type="text" name="first-name" id="i6" required><br><br>

                <label for="first-name">Tel</label><br>
                <input type="tel" name="telephone" id="i7" pattern="^\+?[0-9]{10,15}$" placeholder="+00 000 000000000"
                    class="all-inputs" required><br><br>

                <label for="first-name">Email</label><br>
                <input type="text" name="first-name" id="i8" class="all-inputs" required><br><br>

                <input type="checkbox" name="Privacy" id="i9" required>
                <label for="first-name">Agree to terms and conditions</label>
            </form>
            <div class="payment">
                <img src="./chekout-images/ChatGPT Image Jul 6, 2026, 10_35_00 PM.png" alt=""><br>
                <div class="card-small">
                    <label for="card-number">Card number</label><br>
                    <input type="text" name="card-number" id="card-number" placeholder="1234 5678 9012 3456"
                        pattern="[0-9 ]{13,19}" required class="all-inputs"><br><br>
                    <div class="control">
                        <div class="random">
                            <label for="expiry-1">Experation (MM)</label><br>
                            <input type="text" id="month" name="month" placeholder="MM" maxlength="2" required>
                        </div>

                        <div class="random">
                            <label for="experation-2">Experation(YY)</label><br>
                            <input type="text" id="year" name="experation-2" placeholder="YY" maxlength="2" required>
                        </div>
                        <div class="random">
                            <label for="security-code">Card securit code</label><br>
                            <input type="text" name="security-code">
                        </div>

                    </div>


                </div>
            </div>
        </div>
    </main>
    <script src="https://kit.fontawesome.com/943d87bd3c.js" crossorigin="anonymous"></script>
</body>

</html>
